<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Nutri — Personal Health Dashboard</title>
  <meta name="description"
    content="Track your nutrition, build healthy habits, and get AI-powered meal recommendations tailored just for you with Nutri." />

  <meta name="theme-color" content="#3a7d44" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nutri — Personal Health Dashboard" />
  <meta property="og:description"
    content="Track your nutrition, build healthy habits, and get AI-powered meal recommendations." />
  <meta property="og:image" content="/favicon.svg" />

    content="Track your nutrition, build healthy habits, and get AI-powered meal recommendations." />

  <meta http-equiv="X-Frame-Options" content="DENY" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
